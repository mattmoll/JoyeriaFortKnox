<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Fort Knox Logistics{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --fk-dark:   #0d1b2a;
      --fk-blue:   #1b4f8a;
      --fk-accent: #f0a500;
    }
    body {
      background-color: #f4f6f9;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    main { flex: 1; }
    .navbar { background-color: var(--fk-dark); }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; }
    .navbar-brand .accent { color: var(--fk-accent); }
    .navbar-brand .light  { color: #ffffff; }
    .nav-link { color: #9ca3af !important; font-size: .9rem; }
    .nav-link:hover { color: #fff !important; }
    .page-header {
      background: linear-gradient(135deg, var(--fk-dark), var(--fk-blue));
      color: #fff;
      padding: 2.5rem 0 2rem;
      margin-bottom: 2rem;
    }
    .card { border: none; box-shadow: 0 2px 10px rgba(0,0,0,.08); border-radius: .5rem; }
    .status-badge {
      font-size: .78rem;
      padding: .35em .75em;
      border-radius: 2rem;
      font-weight: 600;
    }
    .status-en-camino  { background: #dbeafe; color: #1d4ed8; }
    .status-entregado  { background: #dcfce7; color: #15803d; }
    .status-procesando { background: #f3f4f6; color: #374151; }
    .status-retenido   { background: #fee2e2; color: #b91c1c; }
    footer {
      background-color: var(--fk-dark);
      color: #4b5563;
      font-size: .8rem;
      padding: 1.25rem 0;
      text-align: center;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') if session.user_id else url_for('login') }}">
      <span class="accent">FORT KNOX</span><span class="light"> LOGISTICS</span>
    </a>

  </div>
</nav>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  &copy; 2026 Fort Knox Logistics S.A. &nbsp;&middot;&nbsp; Sistema de Seguimiento v4.2.1
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
